<!-- templates/cart/cart_item.html -->
<div id="cart-item-{{ item.id }}" class="flex flex-col items-center text-center border-b border-gray-100 pb-6 last:border-0">
    <div class="w-32 h-32 bg-gray-50 flex items-center justify-center mb-3">
        {% if item.product.main_image %}
            <img src="{{ item.product.main_image.url }}" alt="{{ item.product.name }}" class="max-h-full max-w-full object-contain">
        {% else %}
            <span class="text-gray-300 text-xs">No img</span>
        {% endif %}
    </div>
    <h3 class="text-sm font-medium uppercase tracking-wide">{{ item.product.name }}</h3>
    <p class="text-xs text-gray-500 mt-1">{{ item.product.color|default:"" }}</p>
    <p class="text-xs text-gray-500">Размер: {{ item.product_size.size.name }}</p>
    <p class="text-sm font-medium mt-2">{{ item.product.price }} ₽</p>

    <div class="flex items-center justify-center mt-3 space-x-3">
        <button class="w-6 h-6 border border-gray-300 flex items-center justify-center text-gray-600 hover:border-black transition-colors"
                hx-post="{% url 'cart:update_cart' item.id %}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-vals='{"quantity": "{{ item.quantity|add:-1 }}"}'
                hx-target="#cart-modal"
                hx-swap="outerHTML"
                {% if item.quantity <= 1 %}disabled{% endif %}>−</button>
        <span class="w-6 text-center text-sm">{{ item.quantity }}</span>
        <button class="w-6 h-6 border border-gray-300 flex items-center justify-center text-gray-600 hover:border-black transition-colors"
                hx-post="{% url 'cart:update_cart' item.id %}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-vals='{"quantity": "{{ item.quantity|add:1 }}"}'
                hx-target="#cart-modal"
                hx-swap="outerHTML">+</button>
    </div>

    <button class="mt-3 text-xs text-gray-400 underline hover:text-black transition-colors"
            hx-post="{% url 'cart:delete_cart' item.id %}"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            hx-target="#cart-modal"
            hx-swap="outerHTML">Удалить</button>
</div>
