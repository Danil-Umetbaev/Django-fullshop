<div class="border border-gray-100 p-6">
    <h2 class="text-sm uppercase tracking-wider mb-4">Детали аккаунта</h2>
    <div class="space-y-2 text-sm text-gray-600">
        <p>{{ user.first_name }} {{ user.last_name }}</p>
        <p>{{ user.email }}</p>
        <p>{{ user.address1|default:"" }} {{ user.address2|default:"" }}</p>
        <p>{{ user.city|default:"" }} {{ user.country|default:"" }}</p>
        <p>{{ user.phone_number|default:"" }}</p>
    </div>
    <div class="mt-6 flex gap-3">
        <button hx-get="{% url 'users:edit_account_details' %}"
                hx-target="#profile-main-content"
                class="text-xs uppercase border border-black px-4 py-2 hover:bg-black hover:text-white transition-colors">
            Редактировать
        </button>
        <!-- Кнопка удаления аккаунта – можно добавить позже -->
    </div>
</div>
