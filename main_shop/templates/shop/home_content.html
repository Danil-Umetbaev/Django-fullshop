<!-- templates/shop/home_content.html -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20">
    <div class="text-center mb-16">
        <h1 class="logo text-4xl md:text-5xl font-light tracking-wide">Cerca Trova</h1>
        <p class="mt-3 text-gray-500 text-sm uppercase tracking-wider">Изысканная одежда</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
        <a href="{% url 'shop:catalog_all' %}"
           hx-get="{% url 'shop:catalog_all' %}"
           hx-target="#main-content"
           hx-push-url="true"
           class="nav-link text-xs uppercase tracking-wide text-gray-700 hover:text-black {% if current_category == category.slug %}active{% endif %}">
           Все категории
        </a>
        {% for category in categories %}
        <a href="{% url 'shop:catalog_filter' category.slug %}"
           hx-get="{% url 'shop:catalog_filter' category.slug %}"
           hx-target="#main-content"
           hx-push-url="true"
           class="block border border-gray-200 p-8 text-center hover:border-gray-400 transition-colors">
            <h2 class="text-lg uppercase tracking-wider font-medium">{{ category.name }}</h2>
        </a>
        {% endfor %}
    </div>
</main>
