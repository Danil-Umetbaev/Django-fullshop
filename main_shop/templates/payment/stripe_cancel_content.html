<main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
    <svg class="mx-auto h-12 w-12 text-gray-400 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
    <h1 class="text-2xl font-light tracking-wide mb-4">Заказ отменён</h1>
    <p class="text-gray-600 text-sm mb-2">Заказ №{{ order.id }} был отменён.</p>
    <p class="text-gray-600 text-sm mb-8">Вы можете вернуться в корзину и попробовать снова.</p>
    <a href="{% url 'orders:checkout' %}"
       hx-get="{% url 'orders:checkout' %}"
       hx-target="#main-content"
       hx-push-url="true"
       class="inline-block border border-black px-6 py-2 text-xs uppercase tracking-wider hover:bg-black hover:text-white transition-colors">
        Вернуться к оформлению
    </a>
</main>
