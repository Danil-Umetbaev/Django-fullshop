<main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
    <svg class="mx-auto h-12 w-12 text-black mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"></path>
    </svg>
    <h1 class="text-2xl font-light tracking-wide mb-4">Спасибо за заказ!</h1>
    <p class="text-gray-600 text-sm mb-2">Ваш заказ №{{ order.id }} успешно оформлен.</p>
    <p class="text-gray-600 text-sm mb-8">Подтверждение отправлено на <strong>{{ order.email }}</strong>.</p>
    <a href="{% url 'shop:index' %}"
       hx-get="{% url 'shop:index' %}"
       hx-target="#main-content"
       hx-push-url="true"
       class="inline-block border border-black px-6 py-2 text-xs uppercase tracking-wider hover:bg-black hover:text-white transition-colors">
        Продолжить покупки
    </a>
</main>
